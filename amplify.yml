version: 1
backend:
  phases:
    build:
      commands:
        - npm ci
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - echo "No frontend build step required"
  artifacts:
    baseDirectory: .
    files:
      - calculator.html
      - amplify_outputs.json
  cache:
    paths:
      - node_modules/**/*
